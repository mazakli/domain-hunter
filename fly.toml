# fly.toml — kuponluk.com Fly.io konfigürasyonu

app = "kuponluk"
primary_region = "ams"  # Amsterdam - Türkiye'ye en yakın ücretsiz bölge

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "kuponluk_data"
  destination = "/app/data"
